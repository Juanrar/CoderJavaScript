<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda PS2</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="navbar-logo">
                <img class="logo-imagen" src="/assets/logo.png">
            </div>
            <ul class="navbar-links">
                <li><button class="boton-categoria">Todos los juegos</button></li>
                <li><button class="boton-categoria">Acción</button></li>
                <li><button class="boton-categoria">Aventura</button></li>
                <li><button class="boton-categoria">Carreras</button></li>
                <li><button class="boton-categoria">Horror</button></li>
                <li><button class="boton-categoria">Mundo Abierto</button></li>
                <li><button class="boton-categoria">RPG</button></li>
                <li><button class="boton-categoria">Sigilo</button></li>
                <li><button class="boton-carrito" >Carrito <span class="carrito-numero">0</span></button></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="contenedor-producto">
            <h2>Todos los juegos</h2>
            <div class="contenedor-juegos">
            <!--Solo para poder ver el css-->
                <div class="producto"> 
                    <img class="producto-imagen">
                    <div class="producto-detalles">
                        <h3 class="producto-titulo">Titulo 1</h3>
                        <p class="producto-precio">Precio</p>
                        <button class="boton-agregar">Agregar</button>
                    </div>
                </div>

                <div class="producto"> 
                    <img class="producto-imagen">
                    <div class="producto-detalles">
                        <h3 class="producto-titulo">Titulo 2</h3>
                        <p class="producto-precio">Precio</p>
                        <button class="boton-agregar">Agregar</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="carrito" class="oculta">
            <h2>Tu carrito</h2>
            <div>...items...</div>
            <p>Total: ...</p>
            <button>Finalizar compra</button>
        </section>
    </main>
    <footer>
        <p class="texto-footer">© 2026 Llego el mono PAPA SRA</p>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
