<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda PS2</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="navbar-logo">
                <img class="logo-imagen" src="/assets/logo.png">
            </div>
            <ul class="navbar-links">
                <li><button class="boton-categoria">Todos los juegos</button></li>
                <li><button class="boton-categoria" data-categoria="Acción">Acción</button></li>
                <li><button class="boton-categoria" data-categoria="Aventura">Aventura</button></li>
                <li><button class="boton-categoria" data-categoria="Carreras">Carreras</button></li>
                <li><button class="boton-categoria" data-categoria="Horror">Horror</button></li>
                <li><button class="boton-categoria" data-categoria="Mundo Abierto">Mundo Abierto</button></li>
                <li><button class="boton-categoria" data-categoria="RPG">RPG</button></li>
                <li><button class="boton-categoria" data-categoria="Sigilo">Sigilo</button></li>
                <li><button class="boton-carrito" >Carrito <span class="carrito-numero">0</span></button></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="contenedor-catalogo">
            <h2>Todos los juegos</h2>
            <div class="grilla-juegos">
            <!--Tarjetas-->
            </div>
        </section>

        <section id="carrito" class="oculta">
            <h2>Tu carrito</h2>
            <div>...items...</div>
            <p>Total: ...</p>
            <button>Finalizar compra</button>
        </section>
    </main>
    <footer>
        <p class="texto-footer">© 2026 Llego el mono PAPA SRA</p>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
